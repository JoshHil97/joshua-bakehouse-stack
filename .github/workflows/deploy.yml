name: Deploy Bakehouse

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Bakehouse CI
    branches:
      - main
    types:
      - completed

permissions:
  contents: read
  id-token: write

env:
  BAKEHOUSE_STACK_NAME: ${{ vars.BAKEHOUSE_STACK_NAME || 'joshua-hilarion-bakehouse' }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID || '827602716979' }}
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-2' }}
  AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN || vars.AWS_ROLE_ARN || 'arn:aws:iam::827602716979:role/github-actions-joshua-hilarion-bakehouse' }}
  LIVE_BASE_URL: ${{ vars.LIVE_BASE_URL || 'https://joshua-hilarion-bakehouse.cta-training.academy' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  preflight-tests:
    name: Unit, lint, build, and local Playwright
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: client

      - name: Run unit and CDK tests
        run: npm run test:unit

      - name: Run client lint
        run: npm run lint
        working-directory: client

      - name: Build client assets
        run: npm run build
        working-directory: client

      - name: Run local mocked Playwright tests
        run: npm run test:e2e
        working-directory: client

  deploy:
    name: Deploy CDK stack and bootstrap database
    runs-on: ubuntu-latest
    needs: preflight-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Build client assets
        run: npm run build
        working-directory: client
        env:
          VITE_STACK_NAME: ${{ env.BAKEHOUSE_STACK_NAME }}

      - name: Validate AWS credentials configuration
        shell: bash
        run: |
          if [ -n "$AWS_ROLE_ARN" ]; then
            echo "Using AWS OIDC role: $AWS_ROLE_ARN"
            exit 0
          fi

          echo "::error::AWS_ROLE_ARN resolved to empty. Add it as a repository secret or variable."
          exit 1

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: gha-cdk-joshua-hilarion-${{ github.run_id }}-${{ github.run_attempt }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity and session
        shell: bash
        run: |
          echo "Verifying AWS credentials..."
          IDENTITY="$(aws sts get-caller-identity)"
          echo "Assumed role:"
          echo "${IDENTITY}" | jq '.'

          ROLE_SESSION="$(echo "${IDENTITY}" | jq -r '.Arn' | grep -oE '[^/]+$')"
          echo "Current session: ${ROLE_SESSION}"

          EXPECTED_SESSION="gha-cdk-joshua-hilarion-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          if [ "$ROLE_SESSION" != "$EXPECTED_SESSION" ]; then
            echo "::error::Expected role session $EXPECTED_SESSION but got $ROLE_SESSION"
            exit 1
          fi

          ACTUAL_ACCOUNT="$(echo "${IDENTITY}" | jq -r '.Account')"
          if [ "$ACTUAL_ACCOUNT" != "$AWS_ACCOUNT_ID" ]; then
            echo "::error::Expected AWS account $AWS_ACCOUNT_ID but got $ACTUAL_ACCOUNT"
            exit 1
          fi

      - name: CDK synth
        run: npx cdk synth
        env:
          BAKEHOUSE_STACK_NAME: ${{ env.BAKEHOUSE_STACK_NAME }}
          AWS_ACCOUNT_ID: ${{ env.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ env.AWS_REGION }}

      - name: CDK deploy
        run: npx cdk deploy --require-approval never
        env:
          BAKEHOUSE_STACK_NAME: ${{ env.BAKEHOUSE_STACK_NAME }}
          AWS_ACCOUNT_ID: ${{ env.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ env.AWS_REGION }}

      - name: Bootstrap database with sample data
        shell: bash
        run: |
          aws lambda invoke \
            --region "$AWS_REGION" \
            --function-name "${BAKEHOUSE_STACK_NAME}-bootstrap-lambda" \
            --cli-binary-format raw-in-base64-out \
            --payload '{}' \
            bootstrap-output.json

          cat bootstrap-output.json | jq '.'

          STATUS_CODE="$(jq -r '.statusCode' bootstrap-output.json)"
          BOOTSTRAP_STATUS="$(jq -r '.body | fromjson | .status' bootstrap-output.json)"

          if [ "$STATUS_CODE" != "201" ] || [ "$BOOTSTRAP_STATUS" != "ok" ]; then
            echo "::error::Database bootstrap failed"
            exit 1
          fi

  post-deploy-tests:
    name: Live Playwright and k6 release tests
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: client

      - name: Wait for live healthcheck
        shell: bash
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent --show-error "$LIVE_BASE_URL/api/healthcheck"; then
              echo
              echo "Live healthcheck passed"
              exit 0
            fi

            echo "Waiting for live site... attempt $attempt"
            sleep 10
          done

          echo "::error::Live healthcheck did not pass in time"
          exit 1

      - name: Run live Playwright release journey
        run: npx playwright test tests/e2e/live-release.spec.js
        working-directory: client
        env:
          LIVE_E2E: true
          PLAYWRIGHT_BASE_URL: ${{ env.LIVE_BASE_URL }}

      - name: Run k6 release performance test
        run: |
          docker run --rm \
            -e BASE_URL="$LIVE_BASE_URL" \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            grafana/k6:0.54.0 run tests/load/release-flow.k6.js
